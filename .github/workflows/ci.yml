name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.26']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests (scalar, windows)
        if: runner.os == 'Windows'
        run: go test -v -race ./...

      - name: Run tests (scalar)
        if: runner.os != 'Windows'
        run: go test -v -race -coverprofile=coverage-scalar.out ./...

      - name: Run tests (SIMD, linux amd64)
        if: runner.os == 'Linux'
        run: GOEXPERIMENT=simd go test -v -race ./...

      - name: Run tests (SIMD, macOS amd64)
        if: runner.os == 'macOS' && runner.arch == 'X64'
        run: GOEXPERIMENT=simd go test -v -race ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: coverage-scalar.out
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Build (scalar)
        run: go build -v ./...

      - name: Build (SIMD)
        run: GOEXPERIMENT=simd go build -v ./...

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Run fuzz tests (short, scalar)
        run: |
          go test -fuzz=FuzzBuildAndSearch -fuzztime=10s ./...
          go test -fuzz=FuzzSIMDConsistency -fuzztime=10s ./...

      - name: Run fuzz tests (short, SIMD)
        run: |
          GOEXPERIMENT=simd go test -fuzz=FuzzBuildAndSearch -fuzztime=10s ./...
          GOEXPERIMENT=simd go test -fuzz=FuzzSIMDConsistency -fuzztime=10s ./...
